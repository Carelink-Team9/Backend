spring:
  application:
    name: carelink

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis
    timeout: 7d

  mvc:
    static-path-pattern: /uploads/**

  web:
    resources:
      static-locations: file:./uploads/

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

openai:
  api-key: ${GPT_API_KEY}
  model: ${GPT_MODEL:gpt-4o-mini}
  vision-model: ${GPT_VISION_MODEL:gpt-4o-mini}
  base-url: https://api.openai.com/v1/chat/completions

gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: https://generativelanguage.googleapis.com


upstage:
  api-key: ${OCR_UPSTAGE_API_KEY}
  ocr-url: https://api.upstage.ai/v1/document-digitization

external:
  hira:
    api-key: ${HIRA_API_KEY}
    base-url: ${HIRA_BASE_URL:http://apis.data.go.kr/B551182/MdcinGrnIdntfcInfoService01}
  easyDrug:
    api-key: ${EASY_DRUG_API_KEY}
    base-url: ${EASY_DRUG_BASE_URL:http://apis.data.go.kr/1471000/DrbEasyDrugInfoService}

file:
  upload-dir: ./uploads/prescriptions/

logging:
  level:
    org:
      springframework: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
