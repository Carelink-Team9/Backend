spring:
  application:
    name: carelink
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/carelink?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:carelink1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis
    timeout: 7d

server:
  port: ${SERVER_PORT:8080}

openai:
  api-key: ${GPT_API_KEY}
  model: ${GPT_MODEL:gpt-4o}
  vision-model: ${GPT_VISION_MODEL:gpt-4o}

external:
  hira:
    api-key: ${HIRA_API_KEY}
    base-url: ${HIRA_BASE_URL:http://apis.data.go.kr/B551182/MdcinGrnIdntfcInfoService01}
  easyDrug:
    api-key: ${EASY_DRUG_API_KEY}
    base-url: ${EASY_DRUG_BASE_URL:http://apis.data.go.kr/1471000/DrbEasyDrugInfoService}