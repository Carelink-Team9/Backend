name: CareLink CI/CD Final

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 1. 이미지 이름을 소문자로 변환하여 환경 변수에 저장
      - name: Lowercase the repo name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. 변환된 소문자 이름을 사용하여 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # 배포 단계에서도 이미지 이름을 소문자로 변환해야 합니다.
      - name: Lowercase the repo name for deploy
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # GHCR 로그인
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 기존 컨테이너 정리
            docker stop carelink-app || true
            docker rm carelink-app || true

            # 소문자 이미지명으로 Pull
            docker pull ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest

            # 네트워크 및 Redis 확인
            if [ ! "$(docker ps -q -f name=carelink-redis)" ]; then
              docker run -d --name carelink-redis --network carelink_network -p 6379:6379 redis:7.2 redis-server --appendonly yes || true
            fi

            # 앱 실행
            docker run -d \
              --name carelink-app \
              --network carelink_network \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e GPT_API_KEY="${{ secrets.GPT_API_KEY }}" \
              -e GPT_MODEL="${{ secrets.GPT_MODEL }}" \
              -e GPT_VISION_MODEL="${{ secrets.GPT_VISION_MODEL }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e GEMINI_MODEL="${{ secrets.GEMINI_MODEL }}" \
              -e OCR_UPSTAGE_API_KEY="${{ secrets.OCR_UPSTAGE_API_KEY }}" \
              -e EASY_DRUG_API_KEY="${{ secrets.EASY_DRUG_API_KEY }}" \
              -e SERVER_PORT="${{ secrets.SERVER_PORT }}" \
              ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest
            
            docker image prune -f