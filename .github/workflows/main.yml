name: CareLink CI/CD with Docker and GHCR

on:
  push:
    branches:
      - main  # main 브랜치에 push될 때 실행

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout 리포지토리
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. GHCR 로그인
      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 2. Docker 이미지 빌드 및 푸시 (작성한 Dockerfile 사용)
      - name: 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push # 빌드가 성공해야 배포 시작
    runs-on: ubuntu-latest

    steps:
      - name: EC2 접속 및 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. GHCR 로그인
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. 기존 컨테이너 중지 및 삭제
            docker stop carelink-app || true
            docker rm carelink-app || true

            # 3. 최신 이미지 Pull
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # 4. Redis 컨테이너가 없다면 실행 ( carelink-network 사용 )
            if [ ! "$(docker ps -q -f name=carelink-redis)" ]; then
                if [ "$(docker ps -aq -f status=exited -f name=carelink-redis)" ]; then
                    docker rm carelink-redis
                fi
                docker run -d --name carelink-redis --network carelink_network -p 6379:6379 redis:7.2 redis-server --appendonly yes
            fi

            # 5. 새 컨테이너 실행 (모든 Secrets 환경변수 주입)
            docker run -d \
              --name carelink-app \
              --network carelink_network \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e GPT_API_KEY="${{ secrets.GPT_API_KEY }}" \
              -e GPT_MODEL="${{ secrets.GPT_MODEL }}" \
              -e GPT_VISION_MODEL="${{ secrets.GPT_VISION_MODEL }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e GEMINI_MODEL="${{ secrets.GEMINI_MODEL }}" \
              -e OCR_UPSTAGE_API_KEY="${{ secrets.OCR_UPSTAGE_API_KEY }}" \
              -e EASY_DRUG_API_KEY="${{ secrets.EASY_DRUG_API_KEY }}" \
              -e MYSQL_DATABASE="${{ secrets.MYSQL_DATABASE }}" \
              -e SERVER_PORT="${{ secrets.SERVER_PORT }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # 6. 사용하지 않는 이미지 정리
            docker image prune -f