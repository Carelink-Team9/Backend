name: CareLink CI/CD Final

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 빌드 속도 향상을 위한 캐시 추가

      # 1. 이미지 이름을 소문자로 변환
      - name: Lowercase the repo name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. GitHub Actions 서버에서 직접 빌드 (권한 부여 포함)
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      # 3. 컨테이너 레지스트리 로그인
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 4. 빌드된 JAR 파일을 포함하여 Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase the repo name for deploy
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker stop carelink-app || true
            docker rm carelink-app || true

            docker pull ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest

            if [ ! "$(docker ps -q -f name=carelink-redis)" ]; then
              docker run -d --name carelink-redis --network carelink_network -p 6379:6379 redis:7.2 redis-server --appendonly yes || true
            fi

            mkdir -p /home/${{ secrets.EC2_USER }}/uploads/prescriptions

            docker run -d \
              --name carelink-app \
              --network carelink_network \
              -p 8080:8080 \
              -v /home/${{ secrets.EC2_USER }}/uploads:/app/uploads \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e GPT_API_KEY="${{ secrets.GPT_API_KEY }}" \
              -e GPT_MODEL="${{ secrets.GPT_MODEL }}" \
              -e GPT_VISION_MODEL="${{ secrets.GPT_VISION_MODEL }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e GEMINI_MODEL="${{ secrets.GEMINI_MODEL }}" \
              -e OCR_UPSTAGE_API_KEY="${{ secrets.OCR_UPSTAGE_API_KEY }}" \
              -e EASY_DRUG_API_KEY="${{ secrets.EASY_DRUG_API_KEY }}" \
              -e SERVER_PORT="${{ secrets.SERVER_PORT }}" \
              ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest
            
            docker image prune -f