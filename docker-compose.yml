version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: carelink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: carelink1234
      MYSQL_DATABASE: carelink
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: carelink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data: